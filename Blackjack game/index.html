<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Play Blackjack</title>
  </head>
  <body>
    <h1>Blackjack</h1>
    <main>
      <p id="message-el">Wants to play a round?</p>
      <p id="cards-el"></p>
      <p id="sum-el"></p>
      <button onclick="startGame()" id="start-game">START GAME</button>
      <button onclick="stopGame()" id="stop-game">STOP</button>
      <button onclick="newCard()" id="new-card">NEW CARD</button>
      <button onclick="restartGame()" id="restart-game">RESTART GAME</button>
      <p id="player-el"></p>
    </main>
    <script src="index.js"></script>
  </body>
</html>
